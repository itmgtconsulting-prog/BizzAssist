name: Bug Report
description: Report a bug in BizzAssist
title: '[BUG] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: '**Note:** Critical bugs should also be reported via the in-app feedback button to auto-create a JIRA ticket.'

  - type: input
    id: jira
    attributes:
      label: JIRA Ticket
      placeholder: 'BIZZ-XXX (create at bizzassist.atlassian.net if not exists)'
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: 'A clear description of the bug'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - 'Critical — data loss or security issue'
        - 'High — feature broken for all users'
        - 'Medium — feature partially broken'
        - 'Low — minor issue'
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'Production / Staging / Local dev'
    validations:
      required: true
