name: CI — BizzAssist Quality Gate

# Runs on every PR and every push to main/develop.
# Implements ISO 27001 A.14: automated quality gate in the SDLC.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24.14.0'

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        env:
          SKIP_ENV_VALIDATION: '1'

      - name: Run Prettier check
        run: npm run format:check
        env:
          SKIP_ENV_VALIDATION: '1'

  # ── 2. TypeScript type check ─────────────────────────────────────────────
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check
        env:
          SKIP_ENV_VALIDATION: '1'

  # ── 3. Unit & Component tests ────────────────────────────────────────────
  test-unit:
    name: Unit & component tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 4. E2E tests against Vercel preview ───────────────────────────────────
  # BIZZ-443: Wait for Vercel preview deployment, then run Playwright against it.
  # On push to main/develop (no preview), falls back to local dev server.
  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel preview deployment
        if: github.event_name == 'pull_request'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          SKIP_ENV_VALIDATION: '1'
          # Use Vercel preview URL when available (PRs), otherwise local dev server
          E2E_BASE_URL: ${{ steps.vercel.outputs.url || '' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder-ci.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key-ci' }}
          # Required for admin operations used by some API routes (e.g. /api/plans
          # creates/updates subscription records via service-role). Without it the
          # fallback local dev server started for push-events on develop/main
          # throws on first request with "SUPABASE_SERVICE_ROLE_KEY is not set".
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── 5. Security audit ────────────────────────────────────────────────────
  security:
    name: Security audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high+critical)
        # BIZZ-297: Upgraded to audit-level=high to catch more vulnerabilities.
        # Previously critical-only due to serialize-javascript transitive vuln
        # which has since been resolved by upgrading Next.js to 16.2.3.
        run: npm audit --audit-level=high

  # ── 6. Build check ───────────────────────────────────────────────────────
  build:
    name: Production build check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js production bundle
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://bizzassist.dk
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          # Sentry build-time vars (use GitHub secrets in production)
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ── 7. RLS Isolation audit ───────────────────────────────────────────────
  # Verifies tenant data isolation against the dev Supabase instance.
  # Runs only on develop and main pushes (not on PRs) to avoid exposing
  # dev credentials in fork PRs.
  # ISO 27001 A.9 (Access Control) — BIZZ-141/142/143/144 regression guard.
  rls-isolation:
    name: RLS tenant isolation audit
    runs-on: ubuntu-latest
    # Only run on pushes to develop/main — skip fork PRs that lack secrets
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RLS isolation tests (vitest)
        run: npm run test:rls
        env:
          RLS_TEST: 'true'
          SKIP_ENV_VALIDATION: '1'

  # ── 8. Sitemap cache pre-warming ─────────────────────────────────────────
  warm-cache:
    name: Sitemap cache pre-warming
    runs-on: ubuntu-latest
    needs: [build]
    # Only run after successful deploys to main
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Warm sitemap cache
        run: node scripts/warm-sitemap.js
        env:
          NEXT_PUBLIC_APP_URL: https://bizzassist.dk
