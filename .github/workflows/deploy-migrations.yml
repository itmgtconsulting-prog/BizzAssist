name: Deploy migrations

# BIZZ-1354: Automatisk migration-deploy via Supabase Management API.
# develop → dev + test, main → prod (med environment approval).
#
# Kun trigget når supabase/migrations/ ændres i merge.
# Idempotent — alle migrations bruger IF NOT EXISTS / DO-blocks.

on:
  push:
    branches: [develop, main]
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy-dev-test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, test]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Find new migration files
        id: migrations
        run: |
          # Find migrations added/modified in this push
          FILES=$(git diff --name-only HEAD~1 HEAD -- supabase/migrations/ | sort)
          if [ -z "$FILES" ]; then
            echo "No new migrations"
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          else
            echo "New migrations:"
            echo "$FILES"
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migrations (${{ matrix.env }})
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF_DEV="wkzwxfhyfmvglrqtmebw"
          REF_TEST="rlkjmqjxmkxuclehbrnl"
          REF="${{ matrix.env == 'dev' && 'wkzwxfhyfmvglrqtmebw' || 'rlkjmqjxmkxuclehbrnl' }}"

          echo "${{ steps.migrations.outputs.files }}" | while read -r FILE; do
            [ -z "$FILE" ] && continue
            echo "--- Running $FILE on ${{ matrix.env }} ($REF) ---"
            QUERY=$(python3 -c "import json; print(json.dumps({'query': open('$FILE').read()}))")
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.supabase.com/v1/projects/$REF/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$QUERY")
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP" -ge 400 ]; then
              echo "FAILED (HTTP $HTTP): $BODY"
              exit 1
            fi
            echo "OK (HTTP $HTTP)"
          done

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Find new migration files
        id: migrations
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- supabase/migrations/ | sort)
          if [ -z "$FILES" ]; then
            echo "No new migrations"
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          else
            echo "New migrations:"
            echo "$FILES"
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migrations (prod)
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          REF="xsyldjqcntiygrtfcszm"
          echo "${{ steps.migrations.outputs.files }}" | while read -r FILE; do
            [ -z "$FILE" ] && continue
            echo "--- Running $FILE on prod ($REF) ---"
            QUERY=$(python3 -c "import json; print(json.dumps({'query': open('$FILE').read()}))")
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.supabase.com/v1/projects/$REF/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$QUERY")
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP" -ge 400 ]; then
              echo "FAILED (HTTP $HTTP): $BODY"
              exit 1
            fi
            echo "OK (HTTP $HTTP)"
          done
