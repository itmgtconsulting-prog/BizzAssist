name: Lighthouse CI

# BIZZ-62: Runs Lighthouse audits on every PR targeting main or develop.
# Enforces minimum scores for performance, accessibility, best-practices, and SEO.
# Accessibility failures are errors (block merge); others are warnings.
on:
  pull_request:
    branches: [main, develop]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'

      # Next.js er SSR — Lighthouse behøver en live server for ikke at
      # ramme CHROME_INTERSTITIAL_ERROR. Start Next i baggrund og vent til
      # port 3000 svarer før Lighthouse prober.
      - name: Start Next.js server
        run: |
          npm start &
          echo $! > .next-server.pid
        env:
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'

      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:3000 >/dev/null 2>&1; then
              echo "server ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start within 60s"; exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Audit kun statiske marketing-sider. Dashboard-ruter kræver
          # ægte Supabase-auth som ikke er tilgængelig i CI, og at audit
          # dem producerede CHROME_INTERSTITIAL_ERROR når serveren
          # serverede fejlsiden.
          urls: |
            http://localhost:3000/privacy
            http://localhost:3000/terms
          budgetPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .next-server.pid ]; then
            kill "$(cat .next-server.pid)" || true
          fi
