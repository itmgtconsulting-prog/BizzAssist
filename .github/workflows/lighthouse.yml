name: Lighthouse CI

# BIZZ-62: Runs Lighthouse audits on every PR targeting main or develop.
# Enforces minimum scores for performance, accessibility, best-practices, and SEO.
# Accessibility failures are errors (block merge); others are warnings.
on:
  pull_request:
    branches: [main, develop]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/login
          budgetPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
