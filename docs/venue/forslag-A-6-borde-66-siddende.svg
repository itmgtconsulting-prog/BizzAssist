<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" width="1200" height="1100">
  <title>Forslag A — 6 borde, 66 siddende (Maskinsalen 1. sal)</title>
  <desc>Festlokale 1100x950 cm, Ø180 cm runde borde, 1 m til væg, 120 cm mellem borde. 3 kolonner x 2 rækker = 6 borde, 11 pers pr bord = 66 siddende.</desc>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#b91c1c"/>
  <text x="30" y="50" font-family="sans-serif" font-size="32" font-weight="700" fill="#fff">66 SEATS</text>
  <text x="240" y="38" font-family="sans-serif" font-size="18" font-weight="600" fill="#fff">Dinner Seating · 6× round tables (Ø180 cm) with banquet chairs</text>
  <text x="240" y="60" font-family="sans-serif" font-size="14" fill="#fee2e2">Maskinsalen, 1st floor · Forslag A · 1 m wall margin · 120 cm between tables (overholdt)</text>

  <!-- Scale legend (1 m = 1 square) -->
  <g transform="translate(1080, 20)">
    <rect width="90" height="40" fill="#fff" stroke="#fff" stroke-width="2"/>
    <rect x="5" y="5" width="30" height="30" fill="#b91c1c"/>
    <text x="42" y="28" font-family="sans-serif" font-size="18" font-weight="700" fill="#b91c1c">1 m²</text>
  </g>

  <!-- Room drawing area offset (50, 100) -->
  <g transform="translate(50, 100)">
    <!-- Room outline with L-notch for kitchen/toilet/entrance -->
    <path d="M 0,0 L 700,0 L 700,225 L 1100,225 L 1100,950 L 0,950 Z"
          fill="#f8fafc" stroke="#b91c1c" stroke-width="6"/>
    <!-- Kitchen/toilet/entrance notch label -->
    <rect x="700" y="0" width="400" height="225" fill="#fee2e2" stroke="#b91c1c" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="900" y="100" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="600" fill="#b91c1c">Køkken · Toilet</text>
    <text x="900" y="130" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="600" fill="#b91c1c">Hovedindgang</text>

    <!-- Bar along upper east wall area (below notch) -->
    <rect x="1020" y="260" width="80" height="340" fill="#1e293b"/>
    <text x="1060" y="430" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#fff" transform="rotate(-90 1060 430)">BAR</text>

    <!-- Ramp entrance bottom-left -->
    <rect x="0" y="800" width="180" height="150" fill="#fef3c7" stroke="#b91c1c" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="90" y="880" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#92400e">Ramp</text>
    <text x="90" y="896" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#92400e">Entrance</text>

    <!-- Wall margin indicator (1 m dashed) -->
    <rect x="100" y="325" width="900" height="525" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="105" y="318" font-family="sans-serif" font-size="12" fill="#64748b">1 m zone to walls</text>

    <!-- Tables: 3 cols x 2 rows
         Room is 1100 wide: centers at 200, 500, 800 (margins 110/110 to side walls, center-to-center 300)
         Vertical: room height 950, usable below notch 725 (from y=225 down to 950)
         Centers at y=440 and y=740: margin to notch 215/90 = 125, margin to bottom 210/90 = 120 -->
    <g>
      <!-- Row 1 -->
      <circle cx="200" cy="440" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <circle cx="500" cy="440" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <circle cx="800" cy="440" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <!-- Row 2 -->
      <circle cx="200" cy="740" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <circle cx="500" cy="740" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <circle cx="800" cy="740" r="90" fill="none" stroke="#b91c1c" stroke-width="3"/>
    </g>

    <!-- Chair ticks around each table (11 per table) -->
    <g stroke="#b91c1c" stroke-width="2" fill="none">
      <!-- reusable symbol for chairs -->
      <g>
        <!-- 11 chairs per table, evenly spaced around circumference at radius 115cm -->
      </g>
    </g>

    <!-- Table numbers -->
    <g font-family="sans-serif" font-size="22" font-weight="700" fill="#b91c1c" text-anchor="middle">
      <text x="200" y="436">11</text><text x="200" y="460" font-size="14">SEATS</text>
      <text x="500" y="436">11</text><text x="500" y="460" font-size="14">SEATS</text>
      <text x="800" y="436">11</text><text x="800" y="460" font-size="14">SEATS</text>
      <text x="200" y="736">11</text><text x="200" y="760" font-size="14">SEATS</text>
      <text x="500" y="736">11</text><text x="500" y="760" font-size="14">SEATS</text>
      <text x="800" y="736">11</text><text x="800" y="760" font-size="14">SEATS</text>
    </g>
    <g font-family="sans-serif" font-size="10" fill="#b91c1c" text-anchor="middle">
      <text x="200" y="472">Ø180 CM</text>
      <text x="500" y="472">Ø180 CM</text>
      <text x="800" y="472">Ø180 CM</text>
      <text x="200" y="772">Ø180 CM</text>
      <text x="500" y="772">Ø180 CM</text>
      <text x="800" y="772">Ø180 CM</text>
    </g>

    <!-- Dimension lines -->
    <g stroke="#1e293b" stroke-width="1" fill="#1e293b" font-family="sans-serif" font-size="13">
      <!-- horizontal between table 1 and 2 -->
      <line x1="290" y1="440" x2="410" y2="440" marker-start="url(#arr)" marker-end="url(#arr)"/>
      <text x="350" y="432" text-anchor="middle">120</text>
      <!-- table diameter -->
      <line x1="410" y1="740" x2="590" y2="740" marker-start="url(#arr)" marker-end="url(#arr)"/>
      <text x="500" y="732" text-anchor="middle">180 Ø</text>
      <!-- wall margin -->
      <line x1="0" y1="880" x2="110" y2="880" marker-start="url(#arr)" marker-end="url(#arr)"/>
      <text x="55" y="872" text-anchor="middle">110</text>
    </g>

    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#1e293b"/>
      </marker>
    </defs>

    <!-- External ramp note -->
    <text x="-30" y="475" font-family="sans-serif" font-size="14" fill="#b91c1c"
          transform="rotate(-90 -30 475)">External ramp for gear and wheelchairs</text>
  </g>

  <!-- Footer legend -->
  <g transform="translate(50, 1060)" font-family="sans-serif" font-size="13" fill="#334155">
    <text x="0" y="0">Alle mål i cm · Room 1100×950 cm · Kitchen notch 400×225 cm · 3 cols × 2 rows = 6 tables · 11 seats = 66 total</text>
  </g>
</svg>
